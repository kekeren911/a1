<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态发布</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 发布区域 */
        .post-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .post-box textarea {
            width: 100%;
            min-height: 100px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        .post-box textarea:focus {
            border-color: #1877f2;
        }

        .post-box .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-secondary {
            background: #e4e6eb;
            color: #050505;
        }

        .btn-secondary:hover {
            background: #d8dadf;
        }

        .btn-primary {
            background: #1877f2;
            color: white;
        }

        .btn-primary:hover {
            background: #166fe5;
        }

        .btn-primary:disabled {
            background: #e4e6eb;
            color: #8a8d91;
            cursor: not-allowed;
        }

        /* 动态列表 */
        .post {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .post-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
        }

        .post-time {
            color: #65676b;
            font-size: 13px;
            margin-top: 2px;
        }

        .post-content {
            padding: 4px 16px 16px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .post-actions {
            border-top: 1px solid #e4e6eb;
            border-bottom: 1px solid #e4e6eb;
            padding: 4px 16px;
            display: flex;
            justify-content: space-around;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 12px;
            border: none;
            background: none;
            color: #65676b;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #f2f2f2;
        }

        .action-btn.liked {
            color: #1877f2;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 评论区 */
        .comments-section {
            padding: 12px 16px;
            background: #f7f8fa;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .comment-input-wrapper .avatar {
            width: 32px;
            height: 32px;
            font-size: 14px;
        }

        .comment-input-wrapper input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 18px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .comment-input-wrapper input:focus {
            border-color: #1877f2;
        }

        .comments-list {
            margin-top: 12px;
        }

        .comment {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .comment .avatar {
            width: 32px;
            height: 32px;
            font-size: 12px;
        }

        .comment-content {
            background: #f0f2f5;
            border-radius: 12px;
            padding: 8px 12px;
            flex: 1;
        }

        .comment-user {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .comment-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .comment-action {
            font-size: 12px;
            color: #65676b;
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px 0;
        }

        .comment-action:hover {
            text-decoration: underline;
        }

        /* 点赞数显示 */
        .likes-count {
            padding: 10px 16px;
            color: #65676b;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #65676b;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .delete-btn {
            color: #dc3545;
            font-size: 12px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background: #fee;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 发布动态 -->
        <div class="post-box">
            <textarea id="postContent" placeholder="分享你的想法..."></textarea>
            <div class="actions">
                <button class="btn btn-secondary" onclick="clearPost()">清空</button>
                <button class="btn btn-primary" id="postBtn" onclick="publishPost()" disabled>发布</button>
            </div>
        </div>

        <!-- 动态列表 -->
        <div id="postsContainer"></div>
    </div>

    <script>
        // 存储动态数据
        let posts = JSON.parse(localStorage.getItem('posts') || '[]');
        let currentUserId = 'user-' + Math.random().toString(36).substr(2, 9);

        // 监听输入
        document.getElementById('postContent').addEventListener('input', function() {
            document.getElementById('postBtn').disabled = this.value.trim() === '';
        });

        // 清空输入
        function clearPost() {
            document.getElementById('postContent').value = '';
            document.getElementById('postBtn').disabled = true;
        }

        // 发布动态
        function publishPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) return;

            const post = {
                id: Date.now(),
                userId: currentUserId,
                userName: currentUser(),
                content: content,
                likes: [],
                comments: [],
                createdAt: new Date().toISOString()
            };

            posts.unshift(post);
            savePosts();
            clearPost();
            renderPosts();
        }

        // 当前用户名
        function currentUser() {
            let name = localStorage.getItem('userName');
            if (!name) {
                name = '用户' + Math.floor(Math.random() * 1000);
                localStorage.setItem('userName', name);
            }
            return name;
        }

        // 保存动态
        function savePosts() {
            localStorage.setItem('posts', JSON.stringify(posts));
        }

        // 点赞/取消点赞
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            const index = post.likes.indexOf(currentUserId);
            if (index > -1) {
                post.likes.splice(index, 1);
            } else {
                post.likes.push(currentUserId);
            }

            savePosts();
            renderPosts();
        }

        // 删除动态
        function deletePost(postId) {
            if (!confirm('确定要删除这条动态吗？')) return;
            posts = posts.filter(p => p.id !== postId);
            savePosts();
            renderPosts();
        }

        // 发表评论
        function postComment(postId, input) {
            const content = input.value.trim();
            if (!content) return;

            const post = posts.find(p => p.id === postId);
            if (!post) return;

            post.comments.push({
                id: Date.now(),
                userId: currentUserId,
                userName: currentUser(),
                content: content,
                createdAt: new Date().toISOString()
            });

            savePosts();
            renderPosts();
        }

        // 删除评论
        function deleteComment(postId, commentId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            post.comments = post.comments.filter(c => c.id !== commentId);
            savePosts();
            renderPosts();
        }

        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
            return date.toLocaleDateString('zh-CN');
        }

        // 渲染动态
        function renderPosts() {
            const container = document.getElementById('postsContainer');

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                        </svg>
                        <p>还没有动态，快来发布第一条吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <div class="avatar">${post.userName.charAt(0)}</div>
                        <div class="user-info">
                            <div class="user-name">${post.userName}</div>
                            <div class="post-time">${formatTime(post.createdAt)}</div>
                        </div>
                        ${post.userId === currentUserId ? `<button class="delete-btn" onclick="deletePost(${post.id})">删除</button>` : ''}
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    ${post.likes.length > 0 ? `<div class="likes-count">${post.likes.length} 人点赞</div>` : ''}
                    <div class="post-actions">
                        <button class="action-btn ${post.likes.includes(currentUserId) ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            <svg viewBox="0 0 24 24" fill="${post.likes.includes(currentUserId) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                            ${post.likes.includes(currentUserId) ? '已赞' : '赞'}
                        </button>
                        <button class="action-btn" onclick="focusComment(${post.id})">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                            </svg>
                            评论 ${post.comments.length > 0 ? `(${post.comments.length})` : ''}
                        </button>
                    </div>
                    <div class="comments-section">
                        <div class="comment-input-wrapper">
                            <div class="avatar" style="width:32px;height:32px;font-size:14px">${currentUser().charAt(0)}</div>
                            <input type="text" placeholder="写评论..." id="comment-input-${post.id}" onkeypress="if(event.key==='Enter')postComment(${post.id},this)">
                        </div>
                        ${post.comments.length > 0 ? `
                            <div class="comments-list">
                                ${post.comments.map(comment => `
                                    <div class="comment">
                                        <div class="avatar">${comment.userName.charAt(0)}</div>
                                        <div>
                                            <div class="comment-content">
                                                <div class="comment-user">${comment.userName}</div>
                                                <div class="comment-text">${escapeHtml(comment.content)}</div>
                                            </div>
                                            <div class="comment-actions">
                                                <span>${formatTime(comment.createdAt)}</span>
                                                ${comment.userId === currentUserId ? `<button class="comment-action" onclick="deleteComment(${post.id},${comment.id})">删除</button>` : ''}
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 聚焦评论输入框
        function focusComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            if (input) input.focus();
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化渲染
        renderPosts();
    </script>
</body>
</html>
