<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁流体物理模拟 | Ferrofluid Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            color: #0ff;
            font-size: 12px;
            z-index: 100;
            min-width: 200px;
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
        }

        .control-group input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: #222;
            height: 6px;
            border-radius: 3px;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #0ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #0ff;
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #0ff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .toggle-btn {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.3s;
            width: 100%;
            margin-top: 5px;
        }

        .toggle-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .toggle-btn.active {
            background: rgba(0, 255, 255, 0.2);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #666;
            font-size: 11px;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            color: #0ff;
            font-size: 11px;
        }

        .stats div {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h3>⚡ 磁流体控制</h3>

        <div class="control-group">
            <label>磁场强度: <span id="strengthValue">50</span></label>
            <input type="range" id="fieldStrength" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <label>流体粘度: <span id="viscosityValue">30</span></label>
            <input type="range" id="viscosity" min="1" max="100" value="30">
        </div>

        <div class="control-group">
            <label>粒子数量: <span id="particlesValue">300</span></label>
            <input type="range" id="particleCount" min="100" max="800" value="300">
        </div>

        <div class="control-group">
            <label>尖峰高度: <span id="spikeValue">40</span></label>
            <input type="range" id="spikeHeight" min="10" max="100" value="40">
        </div>

        <div class="control-group">
            <button class="toggle-btn" id="autoMagnet">🔄 自动磁场</button>
            <button class="toggle-btn" id="rainbowMode">🌈 彩虹模式</button>
            <button class="toggle-btn" id="resetBtn">↻ 重置</button>
        </div>
    </div>

    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>粒子数: <span id="particleCountDisplay">300</span></div>
        <div>磁场源: <span id="fieldSource">鼠标</span></div>
    </div>

    <div class="info">
        移动鼠标控制磁场位置 | 点击创建新磁场源
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 设置画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 模拟参数
        let fieldStrength = 50;
        let viscosity = 30;
        let maxParticles = 300;
        let spikeHeight = 40;
        let autoMagnet = false;
        let rainbowMode = false;

        // 磁场源
        let magneticFields = [
            { x: canvas.width / 2, y: canvas.height / 2, strength: 1 }
        ];

        // 粒子系统
        class Particle {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = Math.random() * 3 + 2;
                this.mass = this.radius * 0.5;
                this.hue = 200 + Math.random() * 40;
            }

            update(deltaTime) {
                let fx = 0, fy = 0;

                // 计算所有磁场的影响
                magneticFields.forEach(field => {
                    const dx = field.x - this.x;
                    const dy = field.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 0) {
                        // 磁力计算 - 越近越强
                        const force = (fieldStrength * field.strength) / (dist * dist + 100);
                        fx += (dx / dist) * force;
                        fy += (dy / dist) * force;
                    }
                });

                // 添加向基点位置的恢复力
                const homingStrength = 0.02;
                fx += (this.baseX - this.x) * homingStrength;
                fy += (this.baseY - this.y) * homingStrength;

                // 应用粘度阻尼
                const damping = 1 - (viscosity / 1000);
                this.vx = this.vx * damping + fx / this.mass;
                this.vy = this.vy * damping + fy / this.mass;

                // 更新位置
                this.x += this.vx;
                this.y += this.vy;

                // 更新颜色
                if (rainbowMode) {
                    this.hue = (this.hue + 0.5) % 360;
                }
            }

            draw() {
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const intensity = Math.min(speed * 20, 100);

                // 创建渐变效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );

                const alpha = 0.3 + intensity * 0.007;
                const hue = rainbowMode ? this.hue : 200 + intensity;

                gradient.addColorStop(0, `hsla(${hue}, 100%, 60%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${hue}, 80%, 40%, ${alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${hue}, 60%, 20%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 磁场尖峰可视化
        class Spike {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseAngle = Math.atan2(y - canvas.height/2, x - canvas.width/2);
                this.height = 0;
                this.targetHeight = 0;
            }

            update(fieldStrength, distance) {
                // 尖峰高度与磁场强度和距离相关
                this.targetHeight = (fieldStrength / 100) * spikeHeight * (1 - distance / 500);
                this.targetHeight = Math.max(0, this.targetHeight);

                // 平滑过渡
                this.height += (this.targetHeight - this.height) * 0.1;
            }

            draw() {
                if (this.height < 1) return;

                const hue = rainbowMode ? (Date.now() / 20) % 360 : 200;

                ctx.save();
                ctx.translate(this.x, this.y);

                // 绘制尖峰
                ctx.beginPath();
                ctx.moveTo(0, 0);

                // 创建锋利的尖峰形状
                const spikeWidth = this.height * 0.3;
                ctx.quadraticCurveTo(
                    spikeWidth, -this.height * 0.5,
                    0, -this.height
                );
                ctx.quadraticCurveTo(
                    -spikeWidth, -this.height * 0.5,
                    0, 0
                );

                const gradient = ctx.createLinearGradient(0, 0, 0, -this.height);
                gradient.addColorStop(0, `hsla(${hue}, 100%, 30%, 0.8)`);
                gradient.addColorStop(0.5, `hsla(${hue}, 80%, 50%, 0.6)`);
                gradient.addColorStop(1, `hsla(${hue}, 60%, 70%, 0.2)`);

                ctx.fillStyle = gradient;
                ctx.fill();

                // 添加发光效果
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = 10;
                ctx.fill();

                ctx.restore();
            }
        }

        // 初始化粒子和尖峰
        let particles = [];
        let spikes = [];

        function initSimulation() {
            particles = [];
            spikes = [];

            // 创建网格状的基础位置
            const gridSize = Math.ceil(Math.sqrt(maxParticles));
            const spacing = Math.min(canvas.width, canvas.height) / gridSize;

            for (let i = 0; i < maxParticles; i++) {
                const row = Math.floor(i / gridSize);
                const col = i % gridSize;
                const x = canvas.width / 2 + (col - gridSize / 2) * spacing;
                const y = canvas.height / 2 + (row - gridSize / 2) * spacing;
                particles.push(new Particle(x, y));
                spikes.push(new Spike(x, y));
            }
        }

        initSimulation();

        // 自动磁场动画
        let autoMagnetAngle = 0;

        function updateAutoMagnet() {
            if (!autoMagnet) return;

            autoMagnetAngle += 0.02;
            const radius = Math.min(canvas.width, canvas.height) * 0.3;
            magneticFields[0].x = canvas.width / 2 + Math.cos(autoMagnetAngle) * radius;
            magneticFields[0].y = canvas.height / 2 + Math.sin(autoMagnetAngle) * radius;
        }

        // 绘制磁场源
        function drawMagneticFields() {
            magneticFields.forEach(field => {
                const gradient = ctx.createRadialGradient(
                    field.x, field.y, 0,
                    field.x, field.y, 50
                );
                gradient.addColorStop(0, 'rgba(0, 255, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(field.x, field.y, 50, 0, Math.PI * 2);
                ctx.fill();

                // 磁场核心
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.arc(field.x, field.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制磁场线
        function drawFieldLines() {
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;

            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const startRadius = 30;
                const endRadius = 200;

                ctx.beginPath();
                for (let r = startRadius; r < endRadius; r += 5) {
                    const x = magneticFields[0].x + Math.cos(angle) * r;
                    const y = magneticFields[0].y + Math.sin(angle) * r;

                    // 添加波动效果
                    const wave = Math.sin(r * 0.05 - Date.now() * 0.005) * 5;
                    const px = x + Math.cos(angle + Math.PI / 2) * wave;
                    const py = y + Math.sin(angle + Math.PI / 2) * wave;

                    if (r === startRadius) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.stroke();
            }
        }

        // 主渲染循环
        let lastTime = 0;
        let frameCount = 0;
        let fpsTime = 0;

        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // 计算FPS
            frameCount++;
            if (currentTime - fpsTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                fpsTime = currentTime;
            }

            // 清除画布（带拖影效果）
            ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新自动磁场
            updateAutoMagnet();

            // 绘制磁场线和源
            drawFieldLines();
            drawMagneticFields();

            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update(deltaTime);
                particle.draw();
            });

            // 更新和绘制尖峰
            spikes.forEach(spike => {
                const dx = spike.x - magneticFields[0].x;
                const dy = spike.y - magneticFields[0].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                spike.update(fieldStrength, distance);
                spike.draw();
            });

            // 连接相邻粒子（创建磁场结构效果）
            connectParticles();

            requestAnimationFrame(animate);
        }

        // 连接相邻粒子
        function connectParticles() {
            const maxDist = 60;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < maxDist) {
                        const alpha = (1 - dist / maxDist) * 0.2;
                        const hue = rainbowMode ? particles[i].hue : 200;
                        ctx.strokeStyle = `hsla(${hue}, 100%, 50%, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 事件监听
        canvas.addEventListener('mousemove', (e) => {
            if (!autoMagnet) {
                magneticFields[0].x = e.clientX;
                magneticFields[0].y = e.clientY;
            }
        });

        canvas.addEventListener('click', (e) => {
            if (magneticFields.length < 3) {
                magneticFields.push({
                    x: e.clientX,
                    y: e.clientY,
                    strength: 0.5
                });
            } else {
                // 重置为单个磁场源
                magneticFields = [{ x: e.clientX, y: e.clientY, strength: 1 }];
            }
            document.getElementById('fieldSource').textContent =
                magneticFields.length === 1 ? '鼠标' : `${magneticFields.length}个源`;
        });

        // 控制面板事件
        document.getElementById('fieldStrength').addEventListener('input', (e) => {
            fieldStrength = parseInt(e.target.value);
            document.getElementById('strengthValue').textContent = fieldStrength;
        });

        document.getElementById('viscosity').addEventListener('input', (e) => {
            viscosity = parseInt(e.target.value);
            document.getElementById('viscosityValue').textContent = viscosity;
        });

        document.getElementById('particleCount').addEventListener('input', (e) => {
            const newCount = parseInt(e.target.value);
            document.getElementById('particlesValue').textContent = newCount;
            maxParticles = newCount;
            initSimulation();
            document.getElementById('particleCountDisplay').textContent = newCount;
        });

        document.getElementById('spikeHeight').addEventListener('input', (e) => {
            spikeHeight = parseInt(e.target.value);
            document.getElementById('spikeValue').textContent = spikeHeight;
        });

        document.getElementById('autoMagnet').addEventListener('click', (e) => {
            autoMagnet = !autoMagnet;
            e.target.classList.toggle('active', autoMagnet);
        });

        document.getElementById('rainbowMode').addEventListener('click', (e) => {
            rainbowMode = !rainbowMode;
            e.target.classList.toggle('active', rainbowMode);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            magneticFields = [{ x: canvas.width / 2, y: canvas.height / 2, strength: 1 }];
            initSimulation();
        });

        // 启动模拟
        animate(0);
    </script>
</body>
</html>
