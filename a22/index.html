<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Stream Player</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>🎵 Music Stream</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search songs..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Player Section -->
            <section class="player-section">
                <div class="album-art">
                    <div class="album-placeholder">🎵</div>
                </div>
                <div class="track-info">
                    <h2 id="currentTrackTitle">No track selected</h2>
                    <p id="currentTrackArtist">-</p>
                </div>

                <!-- Waveform Visualization -->
                <div id="waveform" class="waveform-container"></div>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <span id="currentTime" class="time-display">0:00</span>
                    <div class="progress-bar">
                        <div id="progressBar" class="progress-fill"></div>
                    </div>
                    <span id="duration" class="time-display">0:00</span>
                </div>

                <!-- Player Controls -->
                <div class="player-controls">
                    <button id="prevBtn" class="control-btn" title="Previous">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button id="playPauseBtn" class="control-btn main-control" title="Play/Pause">
                        <svg id="playIcon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pauseIcon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <button id="nextBtn" class="control-btn" title="Next">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                    <button id="shuffleBtn" class="control-btn" title="Shuffle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                        </svg>
                    </button>
                    <button id="repeatBtn" class="control-btn" title="Repeat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                        </svg>
                    </button>
                </div>

                <!-- Volume Control -->
                <div class="volume-container">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                </div>
            </section>

            <!-- Lyrics Section -->
            <section class="lyrics-section">
                <h3>Lyrics</h3>
                <div id="lyricsContainer" class="lyrics-container">
                    <p class="no-lyrics">No lyrics available</p>
                </div>
            </section>
        </main>

        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Playlist Section -->
            <section class="playlist-section">
                <div class="section-header">
                    <h3>Playlist</h3>
                    <span class="collaboration-badge">🔴 Live</span>
                </div>
                <div id="playlist" class="playlist-container">
                    <!-- Playlist items will be populated by JavaScript -->
                </div>
            </section>

            <!-- Queue Section -->
            <section class="queue-section">
                <div class="section-header">
                    <h3>Queue</h3>
                    <button id="clearQueue" class="clear-btn">Clear All</button>
                </div>
                <div id="queue" class="queue-container">
                    <p class="empty-message">Queue is empty</p>
                </div>
                <div class="offline-status" id="offlineStatus">
                    <span class="status-dot"></span>
                    <span id="statusText">Online</span>
                </div>
            </section>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
