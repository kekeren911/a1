<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虚拟教室平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --surface: #0f3460;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --canvas-bg: #ffffff;
            --border-radius: 12px;
            --transition: 200ms ease;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebars */
        .sidebar {
            background: var(--secondary);
            display: flex;
            flex-direction: column;
            transition: width var(--transition), transform var(--transition);
        }

        .sidebar-left {
            width: 240px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-right {
            width: 300px;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header {
            padding: 16px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Participants */
        .participants-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .participant {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--border-radius);
            margin-bottom: 6px;
            background: rgba(255,255,255,0.03);
            transition: background var(--transition);
        }

        .participant:hover {
            background: rgba(255,255,255,0.08);
        }

        .participant-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            position: relative;
        }

        .participant-status {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            border: 2px solid var(--secondary);
        }

        .participant-status.offline {
            background: #6b7280;
        }

        .participant-info {
            flex: 1;
            min-width: 0;
        }

        .participant-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .participant-role {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--secondary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shared-badge {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--accent);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            animation: pulse 2s infinite;
        }

        .shared-badge.active {
            display: flex;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
        }

        .btn-icon {
            padding: 8px;
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #d63d56;
        }

        .btn-recording {
            background: rgba(233, 69, 96, 0.2);
            color: var(--accent);
            position: relative;
        }

        .btn-recording.active {
            background: var(--accent);
            color: white;
        }

        .recording-indicator {
            display: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: recording-pulse 1s infinite;
        }

        .btn-recording.active .recording-indicator {
            display: block;
        }

        .btn-recording.active .recording-text {
            display: none;
        }

        .recording-timer {
            display: none;
            font-family: monospace;
            font-size: 12px;
        }

        .btn-recording.active .recording-timer {
            display: block;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
        }

        /* Whiteboard Container */
        .whiteboard-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            min-height: 0;
            position: relative;
        }

        .whiteboard-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--secondary);
            border-radius: var(--border-radius);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .tool-btn.active {
            background: var(--surface);
            color: var(--text-primary);
        }

        .color-picker {
            display: flex;
            gap: 4px;
        }

        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform var(--transition);
        }

        .color-swatch:hover {
            transform: scale(1.15);
        }

        .color-swatch.active {
            border-color: var(--text-primary);
        }

        .stroke-width {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stroke-width input {
            width: 80px;
            accent-color: var(--accent);
        }

        .stroke-preview {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stroke-dot {
            background: var(--text-primary);
            border-radius: 50%;
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.2);
            margin: 0 6px;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: var(--canvas-bg);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        #whiteboard {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .screen-share-overlay {
            position: absolute;
            border: 3px dashed var(--accent);
            background: rgba(233, 69, 96, 0.1);
            pointer-events: none;
            display: none;
            animation: dash-move 0.5s linear infinite;
        }

        .screen-share-overlay.active {
            display: block;
        }

        @keyframes dash-move {
            0% { border-color: var(--accent); }
            50% { border-color: #ff6b6b; }
            100% { border-color: var(--accent); }
        }

        .screen-share-selection {
            position: absolute;
            border: 2px solid var(--accent);
            background: rgba(233, 69, 96, 0.15);
            cursor: move;
            display: none;
        }

        .screen-share-selection.active {
            display: block;
        }

        /* Chat */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-message {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 85%;
        }

        .chat-message.own {
            align-self: flex-end;
        }

        .chat-message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .chat-message-sender {
            font-weight: 500;
            color: var(--text-primary);
        }

        .chat-message-time {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .chat-message-content {
            padding: 10px 14px;
            background: var(--surface);
            border-radius: 16px;
            border-top-left-radius: 4px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        .chat-message.own .chat-message-content {
            background: var(--accent);
            border-top-left-radius: 16px;
            border-top-right-radius: 4px;
        }

        .chat-input-container {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .emoji-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            transition: all var(--transition);
        }

        .emoji-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--surface);
            border: none;
            border-radius: 20px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 100px;
        }

        .chat-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #d63d56;
            transform: scale(1.05);
        }

        /* Emoji Picker */
        .emoji-picker {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background: var(--secondary);
            border-radius: var(--border-radius);
            padding: 12px;
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .emoji-picker.active {
            display: flex;
        }

        .emoji-picker button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .emoji-picker button:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.15);
        }

        /* Mobile Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
            z-index: 1000;
        }

        /* Mobile Styles */
        @media (max-width: 900px) {
            .sidebar-left {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 100;
                transform: translateX(-100%);
            }

            .sidebar-left.open {
                transform: translateX(0);
            }

            .sidebar-right {
                position: fixed;
                right: 0;
                top: 0;
                bottom: 0;
                width: 100%;
                max-width: 320px;
                z-index: 100;
                transform: translateX(100%);
            }

            .sidebar-right.open {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
                display: none;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .whiteboard-container {
                padding: 12px;
            }

            .whiteboard-toolbar {
                padding: 8px 12px;
                gap: 8px;
            }

            .tool-btn {
                width: 32px;
                height: 32px;
            }

            .color-swatch {
                width: 20px;
                height: 20px;
            }

            .stroke-width input {
                width: 60px;
            }
        }

        @media (max-width: 500px) {
            .header {
                padding: 10px 12px;
            }

            .logo span {
                display: none;
            }

            .connection-status span {
                display: none;
            }

            .toolbar-divider {
                display: none;
            }

            .whiteboard-toolbar {
                justify-content: center;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar - Participants -->
        <aside class="sidebar sidebar-left" id="participantsSidebar">
            <div class="sidebar-header">参与者</div>
            <div class="participants-list" id="participantsList"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="logo">
                        <div class="logo-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                            </svg>
                        </div>
                        <span>虚拟教室</span>
                    </div>
                    <div class="shared-badge" id="sharedBadge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                        屏幕共享中
                    </div>
                </div>
                <div class="header-right">
                    <div class="connection-status">
                        <div class="connection-dot"></div>
                        <span>已连接</span>
                    </div>
                    <button class="btn btn-icon" id="screenShareBtn" title="屏幕共享">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                    </button>
                    <button class="btn btn-recording" id="recordingBtn">
                        <span class="recording-indicator"></span>
                        <span class="recording-text">录制</span>
                        <span class="recording-timer" id="recordingTimer">00:00:00</span>
                    </button>
                </div>
            </header>

            <!-- Whiteboard -->
            <div class="whiteboard-container">
                <div class="whiteboard-toolbar">
                    <div class="tool-group">
                        <button class="tool-btn active" id="penTool" title="画笔">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                                <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                                <path d="M2 2l7.586 7.586"/>
                                <circle cx="11" cy="11" r="2"/>
                            </svg>
                        </button>
                        <button class="tool-btn" id="eraserTool" title="橡皮擦">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L13.4 2.8c.8-.8 2-.8 2.8 0L21 7.6c.8.8.8 2 0 2.8L12 19"/>
                            </svg>
                        </button>
                    </div>

                    <div class="toolbar-divider"></div>

                    <div class="color-picker" id="colorPicker"></div>

                    <div class="toolbar-divider"></div>

                    <div class="stroke-width">
                        <input type="range" id="strokeWidth" min="1" max="20" value="3">
                        <div class="stroke-preview">
                            <div class="stroke-dot" id="strokePreview"></div>
                        </div>
                    </div>

                    <div class="toolbar-divider"></div>

                    <button class="btn btn-icon" id="clearBoard" title="清空白板">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>

                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="whiteboard"></canvas>
                    <div class="screen-share-selection" id="screenShareSelection"></div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar - Chat -->
        <aside class="sidebar sidebar-right" id="chatSidebar">
            <div class="sidebar-header">聊天</div>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入消息...">
                    <button class="send-btn" id="sendBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="emoji-picker" id="emojiPicker"></div>
        </aside>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Mobile Toggle -->
        <button class="mobile-toggle" id="mobileToggle">☰</button>
    </div>

    <script>
        // ==================== STATE ====================
        const state = {
            whiteboard: {
                strokes: [],
                currentStroke: null,
                tool: 'pen',
                color: '#1a1a2e',
                strokeWidth: 3,
                isDrawing: false
            },
            chat: {
                messages: [
                    { id: 1, sender: '李老师', text: '同学们好！今天我们来学习Canvas API', timestamp: new Date(Date.now() - 300000) },
                    { id: 2, sender: '王同学', text: '老师好！👋', timestamp: new Date(Date.now() - 240000) },
                    { id: 3, sender: '李老师', text: '请大家在白板上试着画一些图形', timestamp: new Date(Date.now() - 180000) }
                ],
                nextId: 4
            },
            participants: [
                { id: 1, name: '李老师', role: '教师', initials: '李', online: true },
                { id: 2, name: '王同学', role: '学生', initials: '王', online: true },
                { id: 3, name: '张同学', role: '学生', initials: '张', online: true },
                { id: 4, name: '刘同学', role: '学生', initials: '刘', online: false },
                { id: 5, name: '陈同学', role: '学生', initials: '陈', online: true }
            ],
            recording: {
                isRecording: false,
                startTime: null,
                interval: null
            },
            screenShare: {
                isSharing: false,
                region: null,
                isSelecting: false,
                selectionStart: null
            },
            currentUser: '我'
        };

        // ==================== DOM ELEMENTS ====================
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const participantsList = document.getElementById('participantsList');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const colorPicker = document.getElementById('colorPicker');
        const strokeWidthInput = document.getElementById('strokeWidth');
        const strokePreview = document.getElementById('strokePreview');
        const recordingBtn = document.getElementById('recordingBtn');
        const recordingTimer = document.getElementById('recordingTimer');
        const screenShareBtn = document.getElementById('screenShareBtn');
        const screenShareSelection = document.getElementById('screenShareSelection');
        const sharedBadge = document.getElementById('sharedBadge');
        const clearBoardBtn = document.getElementById('clearBoard');
        const penTool = document.getElementById('penTool');
        const eraserTool = document.getElementById('eraserTool');
        const mobileToggle = document.getElementById('mobileToggle');
        const participantsSidebar = document.getElementById('participantsSidebar');
        const chatSidebar = document.getElementById('chatSidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        // ==================== EMOJIS ====================
        const emojis = ['😊', '👍', '❤️', '🎉', '🤔', '😅', '😂', '🙏', '💪', '🔥', '✅', '⭐', '🎯', '💡', '👏', '😎', '🤝', '📚', '✍️', '🖊️'];

        // ==================== COLORS ====================
        const colors = ['#1a1a2e', '#e94560', '#0f3460', '#4ade80', '#fbbf24', '#3b82f6', '#8b5cf6', '#ec4899', '#ffffff', '#000000'];

        // ==================== INITIALIZATION ====================
        function init() {
            setupCanvas();
            setupColorPicker();
            setupEmojiPicker();
            setupEventListeners();
            renderParticipants();
            renderChatMessages();
            updateStrokePreview();
        }

        function setupCanvas() {
            const resizeCanvas = () => {
                const rect = canvasWrapper.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                redrawCanvas();
            };

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function setupColorPicker() {
            colors.forEach((color, index) => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch' + (index === 0 ? ' active' : '');
                swatch.style.background = color;
                swatch.dataset.color = color;
                swatch.addEventListener('click', () => selectColor(color, swatch));
                colorPicker.appendChild(swatch);
            });
        }

        function setupEmojiPicker() {
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.addEventListener('click', () => insertEmoji(emoji));
                emojiPicker.appendChild(btn);
            });
        }

        // ==================== EVENT LISTENERS ====================
        function setupEventListeners() {
            // Canvas drawing
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);

            // Touch support
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);

            // Tools
            penTool.addEventListener('click', () => selectTool('pen'));
            eraserTool.addEventListener('click', () => selectTool('eraser'));

            // Stroke width
            strokeWidthInput.addEventListener('input', updateStrokeWidth);

            // Clear board
            clearBoardBtn.addEventListener('click', clearBoard);

            // Chat
            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Emoji
            emojiBtn.addEventListener('click', toggleEmojiPicker);
            document.addEventListener('click', (e) => {
                if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
                    emojiPicker.classList.remove('active');
                }
            });

            // Recording
            recordingBtn.addEventListener('click', toggleRecording);

            // Screen share
            screenShareBtn.addEventListener('click', toggleScreenShare);

            // Mobile
            mobileToggle.addEventListener('click', toggleMobileMenu);
            sidebarOverlay.addEventListener('click', closeSidebars);

            // Screen share selection
            canvasWrapper.addEventListener('mousedown', startScreenShareSelection);
            canvasWrapper.addEventListener('mousemove', updateScreenShareSelection);
            canvasWrapper.addEventListener('mouseup', endScreenShareSelection);

            // ESC to cancel screen share
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && state.screenShare.isSelecting) {
                    cancelScreenShareSelection();
                }
            });
        }

        // ==================== DRAWING ====================
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            if (state.screenShare.isSelecting) return;

            const pos = getCanvasPos(e);
            state.whiteboard.isDrawing = true;

            const stroke = {
                tool: state.whiteboard.tool,
                color: state.whiteboard.tool === 'eraser' ? '#ffffff' : state.whiteboard.color,
                width: state.whiteboard.tool === 'eraser' ? state.whiteboard.strokeWidth * 3 : state.whiteboard.strokeWidth,
                points: [pos]
            };

            state.whiteboard.currentStroke = stroke;
            state.whiteboard.strokes.push(stroke);
        }

        function draw(e) {
            if (!state.whiteboard.isDrawing || state.screenShare.isSelecting) return;

            const pos = getCanvasPos(e);
            const stroke = state.whiteboard.currentStroke;

            if (stroke) {
                stroke.points.push(pos);
                redrawCanvas();
            }
        }

        function stopDrawing() {
            state.whiteboard.isDrawing = false;
            state.whiteboard.currentStroke = null;
        }

        function handleTouchStart(e) {
            e.preventDefault();
            startDrawing(e);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            draw(e);
        }

        function redrawCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            state.whiteboard.strokes.forEach(stroke => {
                if (stroke.points.length < 2) return;

                ctx.beginPath();
                ctx.strokeStyle = stroke.color;
                ctx.lineWidth = stroke.width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                for (let i = 1; i < stroke.points.length; i++) {
                    ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                }
                ctx.stroke();
            });

            // Draw current stroke
            if (state.whiteboard.currentStroke && state.whiteboard.currentStroke.points.length > 1) {
                const stroke = state.whiteboard.currentStroke;
                ctx.beginPath();
                ctx.strokeStyle = stroke.color;
                ctx.lineWidth = stroke.width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                for (let i = 1; i < stroke.points.length; i++) {
                    ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                }
                ctx.stroke();
            }
        }

        // ==================== TOOLS ====================
        function selectTool(tool) {
            state.whiteboard.tool = tool;
            penTool.classList.toggle('active', tool === 'pen');
            eraserTool.classList.toggle('active', tool === 'eraser');
        }

        function selectColor(color, swatch) {
            state.whiteboard.color = color;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            swatch.classList.add('active');
        }

        function updateStrokeWidth() {
            state.whiteboard.strokeWidth = parseInt(strokeWidthInput.value);
            updateStrokePreview();
        }

        function updateStrokePreview() {
            const size = Math.min(state.whiteboard.strokeWidth * 2, 20);
            strokePreview.style.width = size + 'px';
            strokePreview.style.height = size + 'px';
        }

        function clearBoard() {
            state.whiteboard.strokes = [];
            redrawCanvas();
        }

        // ==================== PARTICIPANTS ====================
        function renderParticipants() {
            participantsList.innerHTML = '';
            state.participants.forEach(p => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `
                    <div class="participant-avatar">
                        ${p.initials}
                        <div class="participant-status ${p.online ? '' : 'offline'}"></div>
                    </div>
                    <div class="participant-info">
                        <div class="participant-name">${p.name}</div>
                        <div class="participant-role">${p.role}</div>
                    </div>
                `;
                participantsList.appendChild(div);
            });
        }

        // ==================== CHAT ====================
        function renderChatMessages() {
            chatMessages.innerHTML = '';
            state.chat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'chat-message' + (msg.sender === state.currentUser ? ' own' : '');
                div.innerHTML = `
                    <div class="chat-message-header">
                        <span class="chat-message-sender">${msg.sender}</span>
                        <span class="chat-message-time">${formatTime(msg.timestamp)}</span>
                    </div>
                    <div class="chat-message-content">${escapeHtml(msg.text)}</div>
                `;
                chatMessages.appendChild(div);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            state.chat.messages.push({
                id: state.chat.nextId++,
                sender: state.currentUser,
                text: text,
                timestamp: new Date()
            });

            chatInput.value = '';
            renderChatMessages();
        }

        function insertEmoji(emoji) {
            chatInput.value += emoji;
            chatInput.focus();
            emojiPicker.classList.remove('active');
        }

        function toggleEmojiPicker() {
            emojiPicker.classList.toggle('active');
        }

        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== RECORDING ====================
        function toggleRecording() {
            if (state.recording.isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            state.recording.isRecording = true;
            state.recording.startTime = Date.now();
            recordingBtn.classList.add('active');

            state.recording.interval = setInterval(updateRecordingTimer, 1000);
            updateRecordingTimer();
        }

        function stopRecording() {
            state.recording.isRecording = false;
            state.recording.startTime = null;
            recordingBtn.classList.remove('active');

            if (state.recording.interval) {
                clearInterval(state.recording.interval);
                state.recording.interval = null;
            }
            recordingTimer.textContent = '00:00:00';
        }

        function updateRecordingTimer() {
            const elapsed = Date.now() - state.recording.startTime;
            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);

            recordingTimer.textContent =
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');
        }

        // ==================== SCREEN SHARE ====================
        function toggleScreenShare() {
            if (state.screenShare.isSharing) {
                stopScreenShare();
            } else {
                startScreenShareSelection();
            }
        }

        function startScreenShareSelection() {
            state.screenShare.isSelecting = true;
            state.screenShare.selectionStart = null;
            screenShareBtn.classList.add('active');
            screenShareSelection.classList.remove('active');
            canvas.style.cursor = 'crosshair';
        }

        function updateScreenShareSelection(e) {
            if (!state.screenShare.isSelecting) return;

            const rect = canvasWrapper.getBoundingClientRect();
            const clientX = e.clientX;
            const clientY = e.clientY;

            if (!state.screenShare.selectionStart) {
                state.screenShare.selectionStart = {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            const startX = Math.min(state.screenShare.selectionStart.x, clientX - rect.left);
            const startY = Math.min(state.screenShare.selectionStart.y, clientY - rect.top);
            const width = Math.abs(clientX - rect.left - state.screenShare.selectionStart.x);
            const height = Math.abs(clientY - rect.top - state.screenShare.selectionStart.y);

            screenShareSelection.style.left = startX + 'px';
            screenShareSelection.style.top = startY + 'px';
            screenShareSelection.style.width = width + 'px';
            screenShareSelection.style.height = height + 'px';
            screenShareSelection.classList.add('active');
        }

        function endScreenShareSelection(e) {
            if (!state.screenShare.isSelecting) return;

            const rect = canvasWrapper.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;

            if (state.screenShare.selectionStart) {
                const startX = state.screenShare.selectionStart.x;
                const startY = state.screenShare.selectionStart.y;

                const width = Math.abs(endX - startX);
                const height = Math.abs(endY - startY);

                if (width > 20 && height > 20) {
                    state.screenShare.region = {
                        x: Math.min(startX, endX),
                        y: Math.min(startY, endY),
                        width: width,
                        height: height
                    };
                    state.screenShare.isSharing = true;
                    sharedBadge.classList.add('active');
                    screenShareBtn.classList.add('active');
                }
            }

            cancelScreenShareSelection();
        }

        function cancelScreenShareSelection() {
            state.screenShare.isSelecting = false;
            state.screenShare.selectionStart = null;
            screenShareSelection.classList.remove('active');
            canvas.style.cursor = 'default';
        }

        function stopScreenShare() {
            state.screenShare.isSharing = false;
            state.screenShare.region = null;
            sharedBadge.classList.remove('active');
            screenShareBtn.classList.remove('active');
            cancelScreenShareSelection();
        }

        // ==================== MOBILE ====================
        function toggleMobileMenu() {
            const isOpen = participantsSidebar.classList.contains('open') || chatSidebar.classList.contains('open');

            if (isOpen) {
                closeSidebars();
            } else {
                participantsSidebar.classList.add('open');
                sidebarOverlay.classList.add('active');
            }
        }

        function closeSidebars() {
            participantsSidebar.classList.remove('open');
            chatSidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        // ==================== START ====================
        init();
    </script>
</body>
</html>
