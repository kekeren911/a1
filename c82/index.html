<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁流体物理模拟实验</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>磁流体物理模拟实验</h1>
        <p class="subtitle">移动鼠标或触摸屏幕与磁流体互动</p>
        <canvas id="ferrofluidCanvas"></canvas>
        <div class="controls">
            <div class="control-group">
                <label for="particleCount">粒子数量: <span id="particleCountValue">1000</span></label>
                <input type="range" id="particleCount" min="500" max="2000" value="1000" step="100">
            </div>
            <div class="control-group">
                <label for="magneticStrength">磁场强度: <span id="magneticStrengthValue">50</span></label>
                <input type="range" id="magneticStrength" min="10" max="100" value="50">
            </div>
            <div class="control-group">
                <label for="viscosity">流体粘度: <span id="viscosityValue">0.98</span></label>
                <input type="range" id="viscosity" min="0.90" max="0.99" value="0.98" step="0.01">
            </div>
        </div>
    </div>
    <script src="ferromagnetic-fluid.js"></script>
</body>
</html>
