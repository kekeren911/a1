<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizCraft - 在线问卷构建工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6366F1;
      --primary-hover: #4F46E5;
      --secondary: #EC4899;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --text: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo svg {
      width: 32px;
      height: 32px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg);
    }

    .btn-danger {
      background: var(--error);
      color: white;
    }

    .btn-danger:hover {
      background: #DC2626;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-icon:hover {
      background: var(--bg);
    }

    /* Builder Layout */
    .builder {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      flex: 1;
      overflow: hidden;
    }

    @media (max-width: 1024px) {
      .builder {
        grid-template-columns: 1fr;
      }
      .builder-sidebar, .builder-preview {
        display: none;
      }
    }

    .builder-sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-title {
      font-weight: 600;
      font-size: 14px;
    }

    .question-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .question-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .question-item:hover {
      border-color: var(--primary);
    }

    .question-item.active {
      border-color: var(--primary);
      background: white;
      box-shadow: var(--shadow);
    }

    .question-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .question-item-type {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--primary);
      color: white;
      text-transform: uppercase;
    }

    .question-item-number {
      font-weight: 600;
      font-size: 13px;
    }

    .question-item-text {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Editor Panel */
    .builder-main {
      padding: 24px;
      overflow-y: auto;
    }

    .editor-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      max-width: 700px;
      margin: 0 auto;
    }

    .editor-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-item input {
      flex: 1;
    }

    .option-item .btn-icon {
      flex-shrink: 0;
    }

    .add-option-btn {
      margin-top: 8px;
      color: var(--primary);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .add-option-btn:hover {
      text-decoration: underline;
    }

    /* Branching Rules */
    .branching-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .branching-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .branch-rule {
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .branch-rule-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .branch-rule select, .branch-rule input {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
    }

    /* Preview Panel */
    .builder-preview {
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
    }

    .preview-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .preview-card {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 20px;
    }

    .preview-question {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .preview-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .preview-checkbox, .preview-radio {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
    }

    .preview-radio {
      border-radius: 50%;
    }

    /* Quiz Mode */
    .quiz-mode {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .quiz-container {
      max-width: 640px;
      margin: 0 auto;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .quiz-progress {
      flex: 1;
      min-width: 200px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      color: white;
      font-size: 13px;
      margin-top: 6px;
      opacity: 0.9;
    }

    .quiz-timer {
      background: rgba(255,255,255,0.2);
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quiz-timer.warning {
      background: var(--error);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .quiz-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 32px;
    }

    .quiz-question-number {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .quiz-question-text {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quiz-option {
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .quiz-option:hover {
      border-color: var(--primary);
      background: var(--bg);
    }

    .quiz-option.selected {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
    }

    .quiz-option-indicator {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quiz-option.selected .quiz-option-indicator {
      border-color: var(--primary);
      background: var(--primary);
    }

    .quiz-option.selected .quiz-option-indicator::after {
      content: '';
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
    }

    .quiz-option-checkbox .quiz-option-indicator {
      border-radius: 6px;
    }

    .quiz-option-checkbox.selected .quiz-option-indicator::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
      border-radius: 0;
      background: none;
      width: auto;
      height: auto;
    }

    .quiz-text-input {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    .quiz-text-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .quiz-slider-container {
      padding: 0 10px;
    }

    .quiz-slider {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: var(--border);
      -webkit-appearance: none;
      appearance: none;
    }

    .quiz-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .quiz-slider-value {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 16px;
    }

    .quiz-slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .quiz-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      gap: 12px;
    }

    /* Results Mode */
    .results-mode {
      min-height: 100vh;
      background: var(--bg);
      padding: 40px 20px;
    }

    .results-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .results-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .results-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .results-subtitle {
      color: var(--text-muted);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .results-stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .results-stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--primary);
    }

    .results-stat-label {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .results-chart-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .results-chart-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 16px;
    }

    .results-text-answers {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .text-answer-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .text-answer-item:last-child {
      border-bottom: none;
    }

    .text-answer-question {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .text-answer-value {
      font-size: 15px;
    }

    /* Share Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .share-url {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 12px;
    }

    .copy-feedback {
      color: var(--success);
      font-size: 13px;
      margin-top: 8px;
    }

    /* Quiz Settings */
    .quiz-settings {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .quiz-settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .quiz-settings-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: white;
      padding: 14px 20px;
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      z-index: 1001;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Utility */
    .hidden {
      display: none !important;
    }

    /* Responsive Quiz */
    @media (max-width: 600px) {
      .quiz-mode {
        padding: 12px;
      }

      .quiz-card {
        padding: 20px;
      }

      .quiz-question-text {
        font-size: 18px;
      }

      .quiz-option {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="currentColor"/>
          <path d="M8 10h16M8 16h12M8 22h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        QuizCraft
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="app.newQuiz()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          新建问卷
        </button>
        <button class="btn btn-primary" onclick="app.previewQuiz()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          预览问卷
        </button>
        <button class="btn btn-success" onclick="app.shareQuiz()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
          分享问卷
        </button>
      </div>
    </header>

    <!-- Builder Mode -->
    <main class="builder" id="builderMode">
      <!-- Left Sidebar - Question List -->
      <aside class="builder-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">问题列表</span>
          <button class="btn btn-sm btn-primary" onclick="app.addQuestion()">+ 添加问题</button>
        </div>
        <div class="question-list" id="questionList"></div>
      </aside>

      <!-- Center - Question Editor -->
      <section class="builder-main" id="editorSection">
        <div class="editor-card" id="editorCard">
          <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <h3>开始创建问卷</h3>
            <p>点击"添加问题"来创建您的第一个问题</p>
          </div>
          <div id="editorForm" class="hidden">
            <h2 class="editor-title">编辑问题</h2>
            <div class="form-group">
              <label class="form-label">问题类型</label>
              <select class="form-select" id="questionType">
                <option value="single">单选题</option>
                <option value="multiple">多选题</option>
                <option value="text">文本输入</option>
                <option value="slider">滑块</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">问题内容</label>
              <textarea class="form-textarea" id="questionText" placeholder="请输入问题内容..."></textarea>
            </div>
            <div id="optionsEditor">
              <div class="form-group">
                <label class="form-label">选项</label>
                <div class="options-list" id="optionsList"></div>
                <div class="add-option-btn" onclick="app.addOption()">+ 添加选项</div>
              </div>
            </div>
            <div id="sliderEditor" class="hidden">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">最小值</label>
                  <input type="number" class="form-input" id="sliderMin" value="0">
                </div>
                <div class="form-group">
                  <label class="form-label">最大值</label>
                  <input type="number" class="form-input" id="sliderMax" value="100">
                </div>
                <div class="form-group">
                  <label class="form-label">步进值</label>
                  <input type="number" class="form-input" id="sliderStep" value="1">
                </div>
              </div>
            </div>
            <div id="textEditor" class="hidden">
              <div class="form-group">
                <label class="form-label">正则验证（可选）</label>
                <input type="text" class="form-input" id="textRegex" placeholder="例如：^[\u4e00-\u9fa5]+$">
              </div>
            </div>
            <div class="branching-section">
              <div class="branching-title">分支逻辑 - 根据答案跳转到指定问题</div>
              <div id="branchRules"></div>
              <div class="add-option-btn" onclick="app.addBranchRule()">+ 添加分支规则</div>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 12px;">
              <button class="btn btn-danger btn-sm" onclick="app.deleteQuestion()">删除问题</button>
              <button class="btn btn-primary btn-sm" onclick="app.saveQuestion()">保存问题</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Right Sidebar - Quiz Settings & Preview -->
      <aside class="builder-preview">
        <div class="quiz-settings">
          <div class="form-group" style="margin-bottom: 12px;">
            <label class="form-label">问卷标题</label>
            <input type="text" class="form-input" id="quizTitle" placeholder="请输入问卷标题" value="我的问卷">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">时间限制（分钟）</label>
              <input type="number" class="form-input" id="quizTime" value="0" min="0" placeholder="0表示不限">
            </div>
          </div>
        </div>
        <div class="preview-title">实时预览</div>
        <div class="preview-card" id="livePreview">
          <div class="empty-state">
            <p style="font-size: 13px;">添加问题后在此预览</p>
          </div>
        </div>
        <div style="margin-top: 20px;">
          <canvas id="resultsChart" height="200"></canvas>
        </div>
      </aside>
    </main>
  </div>

  <!-- Share Modal -->
  <div class="modal-overlay hidden" id="shareModal">
    <div class="modal">
      <h3 class="modal-title">分享问卷</h3>
      <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 16px;">复制以下链接分享您的问卷</p>
      <input type="text" class="share-url" id="shareUrl" readonly>
      <button class="btn btn-primary" onclick="app.copyShareUrl()">复制链接</button>
      <div class="copy-feedback hidden" id="copyFeedback">链接已复制到剪贴板！</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // Question Types Configuration
    const QUESTION_TYPES = {
      single: { label: '单选题', hasOptions: true },
      multiple: { label: '多选题', hasOptions: true },
      text: { label: '文本输入', hasOptions: false },
      slider: { label: '滑块', hasOptions: false }
    };

    // Comparison Operators
    const OPERATORS = {
      equals: '等于',
      not_equals: '不等于',
      contains: '包含',
      greater_than: '大于',
      less_than: '小于'
    };

    class QuizApp {
      constructor() {
        this.questions = [];
        this.currentQuestionIndex = -1;
        this.answers = {};
        this.quizTitle = '我的问卷';
        this.timeLimit = 0;
        this.timerInterval = null;
        this.timeRemaining = 0;
        this.chart = null;
        this.previewChart = null;

        this.init();
      }

      init() {
        this.loadFromUrl();
        this.renderQuestionList();
        this.updatePreview();
        this.initPreviewChart();

        document.getElementById('questionType').addEventListener('change', () => this.onTypeChange());
        document.getElementById('quizTitle').addEventListener('input', (e) => {
          this.quizTitle = e.target.value;
          this.updateUrl();
        });
        document.getElementById('quizTime').addEventListener('input', (e) => {
          this.timeLimit = parseInt(e.target.value) || 0;
        });
      }

      // Generate unique ID
      generateId() {
        return 'q_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      }

      // Encode data for URL
      encodeData() {
        const data = {
          title: this.quizTitle,
          timeLimit: this.timeLimit,
          questions: this.questions
        };
        return btoa(encodeURIComponent(JSON.stringify(data)));
      }

      // Decode data from URL
      decodeData(hash) {
        try {
          const data = JSON.parse(decodeURIComponent(atob(hash)));
          this.quizTitle = data.title || '我的问卷';
          this.timeLimit = data.timeLimit || 0;
          this.questions = data.questions || [];
          return true;
        } catch (e) {
          console.error('Failed to decode data:', e);
          return false;
        }
      }

      // Update URL with current data
      updateUrl() {
        const hash = this.encodeData();
        history.replaceState(null, '', `#/q/${hash}`);
      }

      // Load from URL
      loadFromUrl() {
        const hash = window.location.hash;
        if (hash.startsWith('#/q/')) {
          const data = hash.slice(4);
          if (this.decodeData(data)) {
            document.getElementById('quizTitle').value = this.quizTitle;
            document.getElementById('quizTime').value = this.timeLimit;
            return;
          }
        }
        // Check localStorage for draft
        const saved = localStorage.getItem('quizcraft_draft');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            this.quizTitle = data.title || '我的问卷';
            this.timeLimit = data.timeLimit || 0;
            this.questions = data.questions || [];
            this.answers = data.answers || {};
            document.getElementById('quizTitle').value = this.quizTitle;
            document.getElementById('quizTime').value = this.timeLimit;
          } catch (e) {}
        }
      }

      // Save draft to localStorage
      saveDraft() {
        const data = {
          title: this.quizTitle,
          timeLimit: this.timeLimit,
          questions: this.questions,
          answers: this.answers
        };
        localStorage.setItem('quizcraft_draft', JSON.stringify(data));
      }

      // Clear draft
      clearDraft() {
        localStorage.removeItem('quizcraft_draft');
      }

      // Create new quiz
      newQuiz() {
        if (this.questions.length > 0 && !confirm('确定要清空当前问卷吗？')) {
          return;
        }
        this.questions = [];
        this.answers = {};
        this.quizTitle = '我的问卷';
        this.timeLimit = 0;
        document.getElementById('quizTitle').value = this.quizTitle;
        document.getElementById('quizTime').value = 0;
        history.replaceState(null, '', window.location.pathname);
        this.renderQuestionList();
        this.updatePreview();
        this.showToast('已创建新问卷');
      }

      // Add new question
      addQuestion() {
        const question = {
          id: this.generateId(),
          type: 'single',
          text: '',
          options: ['', ''],
          sliderMin: 0,
          sliderMax: 100,
          sliderStep: 1,
          textRegex: '',
          branches: []
        };
        this.questions.push(question);
        this.renderQuestionList();
        this.selectQuestion(this.questions.length - 1);
        this.updatePreview();
        this.updateUrl();
      }

      // Select question for editing
      selectQuestion(index) {
        this.currentQuestionIndex = index;
        const question = this.questions[index];

        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('editorForm').classList.remove('hidden');

        document.getElementById('questionType').value = question.type;
        document.getElementById('questionText').value = question.text;

        this.onTypeChange();
        this.renderOptions();
        this.renderBranchRules();

        if (question.type === 'slider') {
          document.getElementById('sliderMin').value = question.sliderMin;
          document.getElementById('sliderMax').value = question.sliderMax;
          document.getElementById('sliderStep').value = question.sliderStep;
        }

        if (question.type === 'text') {
          document.getElementById('textRegex').value = question.textRegex || '';
        }

        // Update active state in list
        document.querySelectorAll('.question-item').forEach((el, i) => {
          el.classList.toggle('active', i === index);
        });
      }

      // On question type change
      onTypeChange() {
        const type = document.getElementById('questionType').value;
        document.getElementById('optionsEditor').classList.toggle('hidden', !QUESTION_TYPES[type].hasOptions);
        document.getElementById('sliderEditor').classList.toggle('hidden', type !== 'slider');
        document.getElementById('textEditor').classList.toggle('hidden', type !== 'text');
      }

      // Render options list
      renderOptions() {
        const question = this.questions[this.currentQuestionIndex];
        const container = document.getElementById('optionsList');
        container.innerHTML = question.options.map((opt, i) => `
          <div class="option-item">
            <input type="text" class="form-input" value="${this.escapeHtml(opt)}"
                   onchange="app.updateOption(${i}, this.value)" placeholder="选项 ${i + 1}">
            <button class="btn-icon" onclick="app.removeOption(${i})">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        `).join('');
      }

      // Update option
      updateOption(index, value) {
        this.questions[this.currentQuestionIndex].options[index] = value;
        this.updatePreview();
      }

      // Add option
      addOption() {
        this.questions[this.currentQuestionIndex].options.push('');
        this.renderOptions();
      }

      // Remove option
      removeOption(index) {
        const question = this.questions[this.currentQuestionIndex];
        if (question.options.length > 2) {
          question.options.splice(index, 1);
          this.renderOptions();
        }
      }

      // Render branch rules
      renderBranchRules() {
        const question = this.questions[this.currentQuestionIndex];
        const container = document.getElementById('branchRules');
        const otherQuestions = this.questions
          .filter((q, i) => i !== this.currentQuestionIndex)
          .map((q, i) => {
            const realIndex = this.questions.findIndex(eq => eq.id === q.id);
            return `<option value="${realIndex}">问题 ${realIndex + 1}</option>`;
          }).join('');

        container.innerHTML = question.branches.map((branch, i) => `
          <div class="branch-rule">
            <div class="branch-rule-row">
              <span style="font-size: 13px;">当答案</span>
              <select onchange="app.updateBranch(${i}, 'operator', this.value)">
                ${Object.entries(OPERATORS).map(([key, label]) =>
                  `<option value="${key}" ${branch.operator === key ? 'selected' : ''}>${label}</option>`
                ).join('')}
              </select>
              <input type="text" value="${this.escapeHtml(branch.value)}"
                     onchange="app.updateBranch(${i}, 'value', this.value)" style="flex: 1;">
              <span style="font-size: 13px;">时，跳转到</span>
              <select onchange="app.updateBranch(${i}, 'target', this.value)">
                <option value="-1" ${branch.target === -1 ? 'selected' : ''}>结束问卷</option>
                ${otherQuestions}
              </select>
            </div>
          </div>
        `).join('');
      }

      // Update branch rule
      updateBranch(index, field, value) {
        const branch = this.questions[this.currentQuestionIndex].branches[index];
        if (field === 'target') {
          branch[field] = parseInt(value);
        } else {
          branch[field] = value;
        }
      }

      // Add branch rule
      addBranchRule() {
        this.questions[this.currentQuestionIndex].branches.push({
          operator: 'equals',
          value: '',
          target: -1
        });
        this.renderBranchRules();
      }

      // Save current question
      saveQuestion() {
        const question = this.questions[this.currentQuestionIndex];
        question.type = document.getElementById('questionType').value;
        question.text = document.getElementById('questionText').value;

        if (question.type === 'slider') {
          question.sliderMin = parseInt(document.getElementById('sliderMin').value) || 0;
          question.sliderMax = parseInt(document.getElementById('sliderMax').value) || 100;
          question.sliderStep = parseInt(document.getElementById('sliderStep').value) || 1;
        }

        if (question.type === 'text') {
          question.textRegex = document.getElementById('textRegex').value;
        }

        this.renderQuestionList();
        this.updatePreview();
        this.updateUrl();
        this.saveDraft();
        this.showToast('问题已保存');
      }

      // Delete current question
      deleteQuestion() {
        if (!confirm('确定要删除这个问题吗？')) return;

        this.questions.splice(this.currentQuestionIndex, 1);
        this.currentQuestionIndex = -1;

        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('editorForm').classList.add('hidden');

        this.renderQuestionList();
        this.updatePreview();
        this.updateUrl();
        this.saveDraft();
      }

      // Render question list
      renderQuestionList() {
        const container = document.getElementById('questionList');
        container.innerHTML = this.questions.map((q, i) => `
          <div class="question-item ${i === this.currentQuestionIndex ? 'active' : ''}" onclick="app.selectQuestion(${i})">
            <div class="question-item-header">
              <span class="question-item-type">${QUESTION_TYPES[q.type].label}</span>
              <span class="question-item-number">#${i + 1}</span>
            </div>
            <div class="question-item-text">${this.escapeHtml(q.text) || '未填写问题内容'}</div>
          </div>
        `).join('');
      }

      // Update live preview
      updatePreview() {
        const preview = document.getElementById('livePreview');
        if (this.questions.length === 0) {
          preview.innerHTML = '<div class="empty-state"><p style="font-size: 13px;">添加问题后在此预览</p></div>';
          return;
        }

        const q = this.questions[0];
        let optionsHtml = '';
        if (q.type === 'single' || q.type === 'multiple') {
          optionsHtml = q.options.filter(o => o).map(o => `
            <div class="preview-option">
              <div class="${q.type === 'single' ? 'preview-radio' : 'preview-checkbox'}"></div>
              <span>${this.escapeHtml(o)}</span>
            </div>
          `).join('');
        } else if (q.type === 'slider') {
          optionsHtml = `<div style="color: var(--text-muted); font-size: 13px;">${q.sliderMin} - ${q.sliderMax}</div>`;
        } else if (q.type === 'text') {
          optionsHtml = '<div style="padding: 10px; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 13px;">文本输入框</div>';
        }

        preview.innerHTML = `
          <div class="preview-question">${this.escapeHtml(q.text) || '问题预览'}</div>
          <div class="preview-options">${optionsHtml}</div>
        `;

        this.updatePreviewChart();
      }

      // Initialize preview chart
      initPreviewChart() {
        const ctx = document.getElementById('resultsChart').getContext('2d');
        this.previewChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['问题 1', '问题 2', '问题 3'],
            datasets: [{
              label: '回答分布',
              data: [12, 19, 8],
              backgroundColor: [
                'rgba(99, 102, 241, 0.7)',
                'rgba(236, 72, 153, 0.7)',
                'rgba(16, 185, 129, 0.7)'
              ]
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: { beginAtZero: true }
            }
          }
        });
      }

      // Update preview chart
      updatePreviewChart() {
        if (!this.previewChart) return;

        const labels = this.questions.slice(0, 5).map((_, i) => `问题 ${i + 1}`);
        const data = this.questions.slice(0, 5).map(() => Math.floor(Math.random() * 20) + 5);

        this.previewChart.data.labels = labels;
        this.previewChart.data.datasets[0].data = data;
        this.previewChart.update();
      }

      // Preview quiz
      previewQuiz() {
        if (this.questions.length === 0) {
          this.showToast('请先添加至少一个问题');
          return;
        }

        this.answers = {};
        this.currentQuestionIndex = 0;

        // Load saved answers if exists
        const saved = localStorage.getItem('quizcraft_draft');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.answers) this.answers = data.answers;
          } catch (e) {}
        }

        this.renderQuizMode();
      }

      // Render quiz mode
      renderQuizMode() {
        const app = document.getElementById('app');
        const totalQuestions = this.getTotalQuestions();

        // Find current question based on branching
        let currentQ = this.getCurrentQuestion();
        if (!currentQ) {
          this.renderResultsMode();
          return;
        }

        const currentQIndex = this.questions.indexOf(currentQ);
        const answeredCount = Object.keys(this.answers).length;
        const progress = (answeredCount / totalQuestions) * 100;

        let timerHtml = '';
        if (this.timeLimit > 0) {
          const minutes = Math.floor(this.timeRemaining / 60);
          const seconds = this.timeRemaining % 60;
          const isWarning = this.timeRemaining < this.timeLimit * 60 * 0.25;
          timerHtml = `
            <div class="quiz-timer ${isWarning ? 'warning' : ''}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
              </svg>
              ${minutes}:${seconds.toString().padStart(2, '0')}
            </div>
          `;
        }

        let inputHtml = '';
        if (currentQ.type === 'single') {
          inputHtml = currentQ.options.filter(o => o).map((opt, i) => `
            <div class="quiz-option ${this.answers[currentQ.id] === i ? 'selected' : ''}"
                 onclick="app.selectOption(${i})">
              <div class="quiz-option-indicator"></div>
              <span>${this.escapeHtml(opt)}</span>
            </div>
          `).join('');
        } else if (currentQ.type === 'multiple') {
          const selected = this.answers[currentQ.id] || [];
          inputHtml = currentQ.options.filter(o => o).map((opt, i) => `
            <div class="quiz-option quiz-option-checkbox ${selected.includes(i) ? 'selected' : ''}"
                 onclick="app.toggleMultipleOption(${i})">
              <div class="quiz-option-indicator"></div>
              <span>${this.escapeHtml(opt)}</span>
            </div>
          `).join('');
        } else if (currentQ.type === 'text') {
          inputHtml = `
            <input type="text" class="quiz-text-input"
                   value="${this.escapeHtml(this.answers[currentQ.id] || '')}"
                   placeholder="请输入您的回答..."
                   oninput="app.setTextAnswer(this.value)">
          `;
        } else if (currentQ.type === 'slider') {
          inputHtml = `
            <div class="quiz-slider-container">
              <input type="range" class="quiz-slider"
                     min="${currentQ.sliderMin}" max="${currentQ.sliderMax}" step="${currentQ.sliderStep}"
                     value="${this.answers[currentQ.id] || currentQ.sliderMin}"
                     oninput="app.setSliderAnswer(this.value)">
              <div class="quiz-slider-value">${this.answers[currentQ.id] || currentQ.sliderMin}</div>
              <div class="quiz-slider-labels">
                <span>${currentQ.sliderMin}</span>
                <span>${currentQ.sliderMax}</span>
              </div>
            </div>
          `;
        }

        app.innerHTML = `
          <div class="quiz-mode">
            <div class="quiz-container">
              <div class="quiz-header">
                <div class="quiz-progress">
                  <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                  </div>
                  <div class="progress-text">${answeredCount} / ${totalQuestions} 已回答</div>
                </div>
                ${timerHtml}
              </div>
              <div class="quiz-card">
                <div class="quiz-question-number">问题 ${currentQIndex + 1}</div>
                <div class="quiz-question-text">${this.escapeHtml(currentQ.text)}</div>
                <div class="quiz-options">${inputHtml}</div>
                <div class="quiz-nav">
                  <button class="btn btn-secondary" onclick="app.prevQuestion()" ${currentQIndex === 0 ? 'disabled' : ''}>
                    上一题
                  </button>
                  <button class="btn btn-primary" onclick="app.nextQuestion()">
                    ${this.hasNextQuestion(currentQ) ? '下一题' : '提交问卷'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;

        // Start timer if needed
        if (this.timeLimit > 0 && !this.timerInterval) {
          this.timeRemaining = this.timeLimit * 60;
          this.startTimer();
        }
      }

      // Get total questions (considering branching)
      getTotalQuestions() {
        return this.questions.length;
      }

      // Get current question based on answers
      getCurrentQuestion() {
        // Find first unanswered question
        for (let i = 0; i < this.questions.length; i++) {
          if (this.answers[this.questions[i].id] === undefined) {
            return this.questions[i];
          }
        }
        return null;
      }

      // Check if question has next based on branching
      hasNextQuestion(question) {
        if (question.branches.length === 0) {
          const idx = this.questions.indexOf(question);
          return idx < this.questions.length - 1;
        }
        return true;
      }

      // Select single option
      selectOption(index) {
        const currentQ = this.getCurrentQuestion();
        this.answers[currentQ.id] = index;
        this.saveDraft();
        this.nextQuestion();
      }

      // Toggle multiple option
      toggleMultipleOption(index) {
        const currentQ = this.getCurrentQuestion();
        if (!this.answers[currentQ.id]) {
          this.answers[currentQ.id] = [];
        }
        const idx = this.answers[currentQ.id].indexOf(index);
        if (idx === -1) {
          this.answers[currentQ.id].push(index);
        } else {
          this.answers[currentQ.id].splice(idx, 1);
        }
        this.saveDraft();

        // Update UI
        const options = document.querySelectorAll('.quiz-option');
        options.forEach((opt, i) => {
          opt.classList.toggle('selected', this.answers[currentQ.id].includes(i));
        });
      }

      // Set text answer
      setTextAnswer(value) {
        const currentQ = this.getCurrentQuestion();
        this.answers[currentQ.id] = value;
        this.saveDraft();
      }

      // Set slider answer
      setSliderAnswer(value) {
        const currentQ = this.getCurrentQuestion();
        this.answers[currentQ.id] = parseInt(value);
        document.querySelector('.quiz-slider-value').textContent = value;
        this.saveDraft();
      }

      // Go to next question
      nextQuestion() {
        const currentQ = this.getCurrentQuestion();
        if (!currentQ) {
          this.finishQuiz();
          return;
        }
        const answer = this.answers[currentQ.id];

        // Check branching
        let nextIndex = -1;
        for (const branch of currentQ.branches) {
          if (this.evaluateCondition(answer, branch.operator, branch.value)) {
            nextIndex = branch.target;
            break;
          }
        }

        if (nextIndex === -1) {
          // Default: next question
          const idx = this.questions.indexOf(currentQ);
          nextIndex = idx + 1;
        }

        if (nextIndex >= this.questions.length) {
          this.finishQuiz();
        } else {
          this.renderQuizMode();
        }
      }

      // Go to previous question
      prevQuestion() {
        const idx = this.questions.findIndex((q, i) => {
          const nextUnanswered = this.questions.slice(i + 1).findIndex(eq => this.answers[eq.id] === undefined);
          return nextUnanswered === -1 && this.answers[q.id] !== undefined;
        });

        if (idx > 0) {
          this.renderQuizMode();
        }
      }

      // Evaluate branch condition
      evaluateCondition(answer, operator, value) {
        if (answer === undefined || answer === null) return false;

        switch (operator) {
          case 'equals':
            if (Array.isArray(answer)) return answer.includes(parseInt(value));
            return String(answer) === value;
          case 'not_equals':
            if (Array.isArray(answer)) return !answer.includes(parseInt(value));
            return String(answer) !== value;
          case 'contains':
            return String(answer).includes(value);
          case 'greater_than':
            return parseFloat(answer) > parseFloat(value);
          case 'less_than':
            return parseFloat(answer) < parseFloat(value);
          default:
            return false;
        }
      }

      // Start timer
      startTimer() {
        this.timerInterval = setInterval(() => {
          this.timeRemaining--;
          if (this.timeRemaining <= 0) {
            this.finishQuiz();
          }
          // Update timer display
          const timerEl = document.querySelector('.quiz-timer');
          if (timerEl) {
            const minutes = Math.floor(this.timeRemaining / 60);
            const seconds = this.timeRemaining % 60;
            timerEl.innerHTML = `
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
              </svg>
              ${minutes}:${seconds.toString().padStart(2, '0')}
            `;
            if (this.timeRemaining < this.timeLimit * 60 * 0.25) {
              timerEl.classList.add('warning');
            }
          }
        }, 1000);
      }

      // Finish quiz
      finishQuiz() {
        if (this.timerInterval) {
          clearInterval(this.timerInterval);
          this.timerInterval = null;
        }
        this.renderResultsMode();
      }

      // Render results mode
      renderResultsMode() {
        this.clearDraft();

        const totalQuestions = this.questions.length;
        const answeredQuestions = Object.keys(this.answers).filter(k => {
          const ans = this.answers[k];
          if (Array.isArray(ans)) return ans.length > 0;
          return ans !== undefined && ans !== '';
        }).length;
        const completionRate = Math.round((answeredQuestions / totalQuestions) * 100);

        // Calculate statistics
        const stats = this.calculateStats();

        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="results-mode">
            <div class="results-container">
              <div class="results-header">
                <h1 class="results-title">${this.escapeHtml(this.quizTitle)}</h1>
                <p class="results-subtitle">问卷结果统计</p>
              </div>

              <div class="results-grid">
                <div class="results-stat-card">
                  <div class="results-stat-value">${answeredQuestions}</div>
                  <div class="results-stat-label">已回答问题</div>
                </div>
                <div class="results-stat-card">
                  <div class="results-stat-value">${totalQuestions}</div>
                  <div class="results-stat-label">总问题数</div>
                </div>
                <div class="results-stat-card">
                  <div class="results-stat-value">${completionRate}%</div>
                  <div class="results-stat-label">完成率</div>
                </div>
              </div>

              <div class="results-grid" id="chartsGrid">
                ${stats.charts.map((chart, i) => `
                  <div class="results-chart-card">
                    <div class="results-chart-title">${this.escapeHtml(chart.question)}</div>
                    <canvas id="chart${i}" height="200"></canvas>
                  </div>
                `).join('')}
              </div>

              ${stats.textAnswers.length > 0 ? `
                <div class="results-text-answers">
                  <div class="results-chart-title">文本回答</div>
                  ${stats.textAnswers.map((item, i) => `
                    <div class="text-answer-item">
                      <div class="text-answer-question">${this.escapeHtml(item.question)}</div>
                      <div class="text-answer-value">${this.escapeHtml(item.answer) || '(未回答)'}</div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}

              <div style="text-align: center; margin-top: 32px;">
                <button class="btn btn-primary" onclick="location.reload()">返回编辑</button>
              </div>
            </div>
          </div>
        `;

        // Render charts
        stats.charts.forEach((chart, i) => {
          const ctx = document.getElementById(`chart${i}`).getContext('2d');
          new Chart(ctx, {
            type: chart.type,
            data: chart.data,
            options: {
              responsive: true,
              plugins: {
                legend: { position: 'bottom' }
              }
            }
          });
        });
      }

      // Calculate statistics
      calculateStats() {
        const charts = [];
        const textAnswers = [];

        this.questions.forEach(q => {
          const answer = this.answers[q.id];

          if (q.type === 'single') {
            const counts = new Array(q.options.length).fill(0);
            if (answer !== undefined) {
              counts[answer] = 1;
            }
            charts.push({
              question: q.text,
              type: 'pie',
              data: {
                labels: q.options.filter(o => o),
                datasets: [{
                  data: counts.filter((_, i) => q.options[i]),
                  backgroundColor: [
                    'rgba(99, 102, 241, 0.8)',
                    'rgba(236, 72, 153, 0.8)',
                    'rgba(16, 185, 129, 0.8)',
                    'rgba(245, 158, 11, 0.8)',
                    'rgba(239, 68, 68, 0.8)',
                    'rgba(139, 92, 246, 0.8)'
                  ]
                }]
              }
            });
          } else if (q.type === 'multiple') {
            const counts = new Array(q.options.length).fill(0);
            if (Array.isArray(answer)) {
              answer.forEach(a => counts[a]++);
            }
            charts.push({
              question: q.text,
              type: 'bar',
              data: {
                labels: q.options.filter(o => o),
                datasets: [{
                  label: '选择次数',
                  data: counts.filter((_, i) => q.options[i]),
                  backgroundColor: 'rgba(99, 102, 241, 0.8)'
                }]
              }
            });
          } else if (q.type === 'slider') {
            charts.push({
              question: q.text,
              type: 'bar',
              data: {
                labels: ['回答值'],
                datasets: [{
                  label: '滑块值',
                  data: [answer !== undefined ? answer : 0],
                  backgroundColor: 'rgba(16, 185, 129, 0.8)'
                }]
              }
            });
          } else if (q.type === 'text') {
            textAnswers.push({
              question: q.text,
              answer: answer || ''
            });
          }
        });

        return { charts, textAnswers };
      }

      // Share quiz
      shareQuiz() {
        if (this.questions.length === 0) {
          this.showToast('请先添加至少一个问题');
          return;
        }

        this.updateUrl();
        const url = window.location.origin + window.location.pathname + '#/q/' + this.encodeData();
        document.getElementById('shareUrl').value = url;
        document.getElementById('shareModal').classList.remove('hidden');
      }

      // Copy share URL
      copyShareUrl() {
        const url = document.getElementById('shareUrl').value;
        navigator.clipboard.writeText(url).then(() => {
          document.getElementById('copyFeedback').classList.remove('hidden');
          setTimeout(() => {
            document.getElementById('copyFeedback').classList.add('hidden');
          }, 2000);
        });
      }

      // Show toast
      showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 3000);
      }

      // Escape HTML
      escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    // Initialize app
    const app = new QuizApp();

    // Close modal on overlay click
    document.getElementById('shareModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.target.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
