<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="digitGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="600" height="200" fill="url(#bgGradient)" rx="15"/>

  <!-- 时:分:秒 标签 -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#666">
    <text x="62" y="170" text-anchor="middle">时</text>
    <text x="230" y="170" text-anchor="middle">分</text>
    <text x="398" y="170" text-anchor="middle">秒</text>
  </g>

  <!-- 小时背景框 -->
  <rect x="10" y="50" width="110" height="100" fill="#0a0a15" rx="10" stroke="#333" stroke-width="2"/>

  <!-- 分钟背景框 -->
  <rect x="175" y="50" width="110" height="100" fill="#0a0a15" rx="10" stroke="#333" stroke-width="2"/>

  <!-- 秒钟背景框 -->
  <rect x="340" y="50" width="110" height="100" fill="#0a0a15" rx="10" stroke="#333" stroke-width="2"/>

  <!-- 小时数字 -->
  <text id="hours" x="65" y="115" font-family="Consolas, monospace" font-size="72"
        font-weight="bold" fill="url(#digitGradient)" text-anchor="middle" filter="url(#glow)">00</text>

  <!-- 分钟数字 -->
  <text id="minutes" x="230" y="115" font-family="Consolas, monospace" font-size="72"
        font-weight="bold" fill="url(#digitGradient)" text-anchor="middle" filter="url(#glow)">00</text>

  <!-- 秒钟数字 -->
  <text id="seconds" x="395" y="115" font-family="Consolas, monospace" font-size="72"
        font-weight="bold" fill="url(#digitGradient)" text-anchor="middle" filter="url(#glow)">00</text>

  <!-- 冒号分隔符 -->
  <g fill="#00d4ff" filter="url(#glow)">
    <circle cx="145" cy="85" r="5">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="145" cy="115" r="5">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="85" r="5">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="115" r="5">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 倒计时进度圆环 -->
  <g transform="translate(520, 100)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#333" stroke-width="8"/>
    <circle id="progressRing" cx="0" cy="0" r="45" fill="none" stroke="#00d4ff"
            stroke-width="8" stroke-dasharray="283" stroke-dashoffset="0"
            transform="rotate(-90)" filter="url(#glow)">
    </circle>
  </g>

  <script type="text/javascript">
<
![CDATA[
    // 设置倒计时目标（24小时后）

 const targetTime = new Date().getTime() + (24 * 60 * 60 * 1000);
    const totalTime = 24 * 60 * 60 * 1000; // 总时间24小时

    function updateCountdown()
 {
      const now = new Date().getTime();
      const timeLeft = targetTime - now;

      if (timeLeft <= 0) {
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

      // 更新进度圆环
      const progress = (totalTime - timeLeft) / totalTime;
      const circumference = 2 * Math.PI * 45;
      const offset = circumference * (1 - progress);
      document.getElementById('progressRing').setAttribute('stroke-dashoffset', offset);
    }

    // 每秒更新
    setInterval(updateCountdown, 1000);
    updateCountdown(); // 立即执行一次
  ]]>
  </script>
</svg>