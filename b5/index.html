<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态发布 - 社交平台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>📱 动态广场</h1>
            <div class="user-info">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=current" alt="我的头像" class="avatar">
                <span>我</span>
            </div>
        </header>

        <!-- 发布框 -->
        <div class="post-box">
            <div class="post-header">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=current" alt="我的头像" class="avatar">
                <textarea id="postContent" placeholder="分享你的想法..." rows="3"></textarea>
            </div>
            <div class="post-actions">
                <button class="btn-icon" title="添加图片">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"/>
                    </svg>
                </button>
                <button class="btn-primary" onclick="createPost()">发布</button>
            </div>
        </div>

        <!-- 动态列表 -->
        <div class="posts-container" id="postsContainer">
            <!-- 动态将通过JS动态添加 -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
