<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spark - 配对交友</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --like-color: #FF6B6B;
            --skip-color: #4ECDC4;
            --super-color: #FFE66D;
            --bg-dark: #1a1a2e;
            --bg-light: #16213e;
            --text-dark: #2d3436;
            --text-light: #f5f6fa;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-light);
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(78, 205, 196, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(255, 230, 109, 0.05) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        /* Floating Hearts */
        .floating-heart {
            position: fixed;
            font-size: 20px;
            opacity: 0.15;
            animation: floatUp 15s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(26, 26, 46, 0.9) 0%, transparent 100%);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--like-color) 0%, var(--super-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 24px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* Card Container */
        .card-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 380px;
            height: 520px;
            z-index: 10;
        }

        /* Card Stack */
        .card-stack {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Individual Card */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: #fff;
            overflow: hidden;
            cursor: grab;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        box-shadow 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            will-change: transform;
            user-select: none;
            touch-action: none;
        }

        .card:active {
            cursor: grabbing;
        }

        .card.animating {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        box-shadow 0.3s ease;
        }

        .card.removing {
            transition: transform 0.5s ease-out, opacity 0.3s ease;
            pointer-events: none;
        }

        .card.bounce-back {
            animation: bounceBack 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceBack {
            0% { transform: var(--current-transform); }
            50% { transform: var(--current-transform) scale(1.03); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }

        /* Card Image */
        .card-image {
            width: 100%;
            height: 60%;
            position: relative;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
        }

        /* Card Info */
        .card-info {
            padding: 20px;
            height: 40%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-name {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .card-age {
            font-size: 18px;
            color: #636e72;
            font-weight: 500;
        }

        .card-bio {
            font-size: 14px;
            color: #636e72;
            line-height: 1.5;
            margin-top: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .tag.music { background: rgba(255, 107, 107, 0.15); color: var(--like-color); }
        .tag.travel { background: rgba(78, 205, 196, 0.15); color: var(--skip-color); }
        .tag.food { background: rgba(255, 230, 109, 0.15); color: #e17055; }
        .tag.movie { background: rgba(116, 185, 255, 0.15); color: #0984e3; }
        .tag.sport { background: rgba(162, 155, 254, 0.15); color: #6c5ce7; }
        .tag.art { background: rgba(255, 118, 117, 0.15); color: #d63031; }
        .tag.gaming { background: rgba(0, 184, 148, 0.15); color: #00b894; }
        .tag.fitness { background: rgba(253, 203, 110, 0.15); color: #fdcb6e; }

        /* Swipe Stamps */
        .stamp {
            position: absolute;
            top: 50%;
            transform: translateY(-50%) rotate(-20deg);
            font-size: 48px;
            font-weight: 700;
            padding: 10px 20px;
            border: 5px solid;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .stamp-like {
            right: 20px;
            color: #00b894;
            border-color: #00b894;
            transform: translateY(-50%) rotate(20deg);
        }

        .stamp-skip {
            left: 20px;
            color: #d63031;
            border-color: #d63031;
        }

        /* Action Buttons */
        .actions {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            z-index: 100;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .action-btn:hover {
            transform: scale(1.15);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.skip {
            background: white;
            color: var(--skip-color);
        }

        .action-btn.skip:hover {
            box-shadow: 0 5px 30px rgba(78, 205, 196, 0.5);
        }

        .action-btn.like {
            background: linear-gradient(135deg, var(--like-color) 0%, #ff8787 100%);
            color: white;
        }

        .action-btn.like:hover {
            box-shadow: 0 5px 30px rgba(255, 107, 107, 0.5);
        }

        .action-btn.super {
            background: white;
            color: var(--super-color);
            width: 50px;
            height: 50px;
            font-size: 22px;
        }

        .action-btn.super:hover {
            box-shadow: 0 5px 30px rgba(255, 230, 109, 0.5);
        }

        /* Empty State */
        .empty-state {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            display: none;
        }

        .empty-state.show {
            display: block;
        }

        .empty-state h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
        }

        .empty-state button {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--like-color) 0%, #ff8787 100%);
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .empty-state button:hover {
            transform: scale(1.05);
        }

        /* Profile Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-image {
            width: 100%;
            height: 350px;
            position: relative;
            overflow: hidden;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-info {
            padding: 25px;
        }

        .modal-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .modal-details {
            color: #636e72;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .modal-bio {
            color: var(--text-dark);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Match Popup */
        .match-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .match-popup.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .match-title {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--like-color) 0%, var(--super-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            animation: pulseScale 1s ease infinite;
        }

        @keyframes pulseScale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .match-profiles {
            display: flex;
            align-items: center;
            gap: -20px;
            margin-bottom: 30px;
        }

        .match-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .match-avatar.left {
            animation-delay: 0.1s;
            animation-name: slideInLeft;
        }

        .match-avatar.right {
            animation-delay: 0.2s;
            animation-name: slideInRight;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100px) scale(0.5); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100px) scale(0.5); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        .match-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-heart {
            font-size: 50px;
            animation: heartBeat 0.8s ease infinite;
            z-index: 10;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
        }

        .match-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .match-btn {
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .match-btn.primary {
            background: linear-gradient(135deg, var(--like-color) 0%, #ff8787 100%);
            color: white;
        }

        .match-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .match-btn:hover {
            transform: scale(1.05);
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1999;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 420px) {
            .card-container {
                max-width: 340px;
                height: 480px;
            }

            .card-name {
                font-size: 22px;
            }

            .actions {
                gap: 20px;
            }

            .action-btn {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation"></div>

    <!-- Floating Hearts -->
    <div id="floating-hearts"></div>

    <!-- Header -->

        <div class="logo">
            <span class="logo-icon">✨</span>
            Spark
        </div>
        <div class="nav-buttons">
            <button class="nav-btn">💬</button>
            <button class="nav-btn">👤</button>
        </div>
    </header>

    <!-- Card Container -->
    <div class="card-container">
        <div class="card-stack" id="cardStack"></div>
    </div>

    <!-- Action Buttons -->
    <div class="actions" id="actions">
        <button class="action-btn skip" id="skipBtn">✕</button>
        <button class="action-btn super" id="superBtn">⭐</button>
        <button class="action-btn like" id="likeBtn">♥</button>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
        <h2>暂时没有更多了</h2>
        <p>稍后再来看看有没有新朋友</p>
        <button onclick="resetCards()">重新开始</button>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content">
            <div class="modal-image">
                <img id="modalImage" src="" alt="">
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-info">
                <h2 class="modal-name" id="modalName"></h2>
                <div class="modal-details">
                    <span id="modalAge"></span>
                    <span id="modalLocation"></span>
                </div>
                <p class="modal-bio" id="modalBio"></p>
                <div class="modal-tags" id="modalTags"></div>
            </div>
        </div>
    </div>

    <!-- Match Popup -->
    <div class="match-popup" id="matchPopup">
        <h1 class="match-title">匹配成功!</h1>
        <div class="match-profiles">
            <div class="match-avatar left">
                <img id="matchAvatar1" src="" alt="">
            </div>
            <span class="match-heart">💕</span>
            <div class="match-avatar right">
                <img id="matchAvatar2" src="" alt="">
            </div>
        </div>
        <div class="match-buttons">
            <button class="match-btn primary">发消息</button>
            <button class="match-btn secondary" onclick="closeMatchPopup()">继续滑动</button>
        </div>
    </div>

    <!-- Confetti Container -->
    <div class="confetti" id="confetti"></div>

        // App State
        let cardStack = [];
        let currentIndex = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let currentX = 0;
        let currentY = 0;
        let velocityX = 0;
        let lastX = 0;
        let animationFrame = null;

        // DOM Elements
        const cardStackEl = document.getElementById('cardStack');
        const actionsEl = document.getElementById('actions');
        const emptyStateEl = document.getElementById('emptyState');
        const profileModal = document.getElementById('profileModal');
        const matchPopup = document.getElementById('matchPopup');

        // Initialize floating hearts
        function createFloatingHearts() {
            const container = document.getElementById('floating-hearts');
            const hearts = ['💕', '💖', '💗', '✨', '⭐'];

            for (let i = 0; i < 8; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 15 + 's';
                heart.style.fontSize = (15 + Math.random() * 15) + 'px';
                container.appendChild(heart);
            }
        }

        // Create card element
        function createCard(user, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.id = user.id;
            card.style.zIndex = users.length - index;
            card.style.transform = `scale(${1 - index * 0.05}) translateY(${index * 15}px)`;

            card.innerHTML = `
                <div class="card-image">
                    <img src="${user.avatar}" alt="${user.name}">
                </div>
                <div class="card-info">
                    <div>
                        <h3 class="card-name">${user.name}<span class="card-age">, ${user.age}</span></h3>
                        <p class="card-bio">${user.bio}</p>
                    </div>
                    <div class="card-tags">
                        ${user.tags.map(tag => `<span class="tag ${tag}">${getTagEmoji(tag)} ${tag}</span>`).join('')}
                    </div>
                </div>
                <div class="stamp stamp-like">LIKE</div>
                <div class="stamp stamp-skip">SKIP</div>
            `;

            // Pointer events for drag
            card.addEventListener('pointerdown', handlePointerDown);
            card.addEventListener('pointermove', handlePointerMove);
            card.addEventListener('pointerup', handlePointerUp);
            card.addEventListener('pointercancel', handlePointerUp);

            // Click to open modal (only if minimal movement)
            card.addEventListener('click', (e) => {
                if (Math.abs(currentX) < 10 && Math.abs(currentY) < 10) {
                    openProfileModal(user);
                }
            });

            return card;
        }

        function getTagEmoji(tag) {
            const emojis = {
                music: '🎵',
                travel: '✈️',
                food: '🍜',
                movie: '🎬',
                sport: '⚽',
                art: '🎨',
                gaming: '🎮',
                fitness: '💪'
            };
            return emojis[tag] || '💫';
        }

        // Initialize cards
        function initCards() {
            cardStackEl.innerHTML = '';
            cardStack = [...users];
            currentIndex = 0;

            const visibleUsers = cardStack.slice(0, 3);
            visibleUsers.reverse().forEach((user, index) => {
                const card = createCard(user, index);
                cardStackEl.appendChild(card);
            });

            actionsEl.style.display = 'flex';
            emptyStateEl.classList.remove('show');

            // Add event listeners to action buttons
            document.getElementById('skipBtn').onclick = () => swipeCard('left');
            document.getElementById('likeBtn').onclick = () => swipeCard('right');
            document.getElementById('superBtn').onclick = () => superLike();
        }

        // Pointer handlers
        function handlePointerDown(e) {
            if (e.target.closest('.action-btn')) return;

            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            currentX = 0;
            currentY = 0;
            lastX = e.clientX;
            velocityX = 0;

            const card = e.currentTarget;
            card.classList.add('animating');
            card.setPointerCapture(e.pointerId);

            cancelAnimationFrame(animationFrame);
        }

        function handlePointerMove(e) {
            if (!isDragging) return;

            const card = e.currentTarget;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;

            // Calculate velocity
            velocityX = e.clientX - lastX;
            lastX = e.clientX;

            // Apply transform
            const rotation = currentX * 0.08;
            const maxRotation = 15;
            const clampedRotation = Math.max(-maxRotation, Math.min(maxRotation, rotation));

            card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${clampedRotation}deg)`;
            card.style.setProperty('--current-transform', `translate(${currentX}px, ${currentY}px) rotate(${clampedRotation}deg)`);

            // Update stamps opacity
            const likeStamp = card.querySelector('.stamp-like');
            const skipStamp = card.querySelector('.stamp-skip');

            if (currentX > 0) {
                likeStamp.style.opacity = Math.min(currentX / 100, 1);
                skipStamp.style.opacity = 0;
            } else {
                skipStamp.style.opacity = Math.min(Math.abs(currentX) / 100, 1);
                likeStamp.style.opacity = 0;
            }
        }

        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;

            const card = e.currentTarget;
            card.classList.remove('animating');
            card.releasePointerCapture(e.pointerId);

            // Check threshold
            const threshold = 100;
            const velocityThreshold = 0.5;

            if (currentX > threshold || velocityX > velocityThreshold * 100) {
                // Swipe right (like)
                swipeOff('right');
            } else if (currentX < -threshold || velocityX < -velocityThreshold * 100) {
                // Swipe left (skip)
                swipeOff('left');
            } else {
                // Bounce back
                bounceBack(card);
            }

            // Reset stamps
            const likeStamp = card.querySelector('.stamp-like');
            const skipStamp = card.querySelector('.stamp-skip');
            likeStamp.style.opacity = 0;
            skipStamp.style.opacity = 0;
        }

        function bounceBack(card) {
            card.classList.add('bounce-back');
            card.style.transform = 'translate(0, 0) rotate(0deg)';

            setTimeout(() => {
                card.classList.remove('bounce-back', 'animating');
            }, 400);

            currentX = 0;
            currentY = 0;
        }

        function swipeOff(direction) {
            const card = cardStackEl.querySelector('.card:last-child');
            if (!card) return;

            card.classList.add('removing');
            card.style.pointerEvents = 'none';

            const rotation = direction === 'right' ? 30 : -30;
            const targetX = direction === 'right' ? window.innerWidth : -window.innerWidth;

            card.style.transform = `translate(${targetX}px, ${currentY}px) rotate(${rotation}deg)`;
            card.style.opacity = '0';

            // Check for match (30% chance on like)
            if (direction === 'right' && Math.random() < 0.3) {
                setTimeout(() => showMatch(users[currentIndex]), 300);
            }

            setTimeout(() => {
                card.remove();
                currentIndex++;

                if (currentIndex >= users.length) {
                    showEmptyState();
                } else {
                    // Bring next card to front
                    const nextCard = cardStackEl.querySelector('.card:last-child');
                    if (nextCard) {
                        nextCard.style.transform = 'scale(1) translateY(0)';
                        nextCard.style.zIndex = users.length - currentIndex + 1;
                    }

                    // Add new card behind
                    if (currentIndex + 2 < users.length) {
                        const newCard = createCard(users[currentIndex + 2], 2);
                        newCard.style.transform = `scale(${1 - 2 * 0.05}) translateY(${2 * 15}px)`;
                        newCard.style.zIndex = users.length - currentIndex - 2;
                        cardStackEl.insertBefore(newCard, cardStackEl.firstChild);
                    }
                }
            }, 400);

            currentX = 0;
            currentY = 0;
        }

        function swipeCard(direction) {
            const card = cardStackEl.querySelector('.card:last-child');
            if (!card || isDragging) return;

            currentX = direction === 'right' ? 150 : -150;
            swipeOff(direction);
        }

        function superLike() {
            const card = cardStackEl.querySelector('.card:last-child');
            if (!card) return;

            // Animate card flying up
            card.classList.add('removing');
            card.style.transition = 'transform 0.5s ease, opacity 0.5s ease';
            card.style.transform = 'translateY(-200px) scale(0.5) rotate(0deg)';
            card.style.opacity = '0';

            // Higher match chance for super like
            setTimeout(() => showMatch(users[currentIndex], true), 300);

            setTimeout(() => {
                card.remove();
                currentIndex++;

                if (currentIndex >= users.length) {
                    showEmptyState();
                }
            }, 500);
        }

        function showEmptyState() {
            actionsEl.style.display = 'none';
            emptyStateEl.classList.add('show');
        }

        function resetCards() {
            initCards();
        }

        // Profile Modal
        function openProfileModal(user) {
            document.getElementById('modalImage').src = user.avatar;
            document.getElementById('modalName').textContent = user.name;
            document.getElementById('modalAge').textContent = user.age + '岁';
            document.getElementById('modalLocation').textContent = user.location;
            document.getElementById('modalBio').textContent = user.bio;
            document.getElementById('modalTags').innerHTML = user.tags
                .map(tag => `<span class="tag ${tag}">${getTagEmoji(tag)} ${tag}</span>`)
                .join('');

            profileModal.classList.add('show');
        }

        function closeModal() {
            profileModal.classList.remove('show');
        }

        profileModal.addEventListener('click', (e) => {
            if (e.target === profileModal) {
                closeModal();
            }
        });

        // Match Popup
        function showMatch(user, isSuper = false) {
            const myAvatar = 'https://picsum.photos/seed/me/400/500';
            document.getElementById('matchAvatar1').src = myAvatar;
            document.getElementById('matchAvatar2').src = user.avatar;

            matchPopup.classList.add('show');
            createConfetti();
        }

        function closeMatchPopup() {
            matchPopup.classList.remove('show');
        }

        // Confetti effect
        function createConfetti() {
            const confettiEl = document.getElementById('confetti');
            confettiEl.innerHTML = '';

            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#ff8787', '#a29bfe', '#fd79a8'];

            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 0.5 + 's';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confettiEl.appendChild(piece);
            }

            setTimeout(() => {
                confettiEl.innerHTML = '';
            }, 3500);
        }

        // Close modals on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeMatchPopup();
            }
        });

        // Initialize
        createFloatingHearts();
        initCards();
    </script>
</body>
</html>
