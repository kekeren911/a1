<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即时聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 420px;
      height: 600px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px;
      background: #4a90d9;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header .status {
      font-size: 12px;
      font-weight: normal;
      opacity: 0.9;
    }

    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.incoming {
      align-self: flex-start;
      background: #f0f0f0;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .message.outgoing {
      align-self: flex-end;
      background: #4a90d9;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.unread {
      background: #ffe0e0;
      border: 1px solid #ffcccc;
    }

    .message.outgoing.unread {
      background: #ff6b6b;
    }

    .message .time {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }

    .message.incoming .time {
      text-align: left;
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .emoji-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .emoji-btn:hover {
      background: #e8e8e8;
    }

    .chat-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      max-height: 100px;
      min-height: 40px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: #4a90d9;
    }

    .send-btn {
      width: 56px;
      height: 40px;
      border: none;
      background: #4a90d9;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #3a7bc8;
    }

    .send-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .emoji-picker {
      position: absolute;
      bottom: 70px;
      left: 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 12px;
      display: none;
      flex-wrap: wrap;
      width: 280px;
      gap: 4px;
    }

    .emoji-picker.show {
      display: flex;
    }

    .emoji-picker button {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-picker button:hover {
      background: #f0f0f0;
    }

    .chat-input-wrapper {
      flex: 1;
      position: relative;
    }

    /* Scrollbar */
    .message-list::-webkit-scrollbar {
      width: 6px;
    }

    .message-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .message-list::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span>即时聊天</span>
      <span class="status" id="status">● 在线</span>
    </div>
    <div class="message-list" id="messageList"></div>
    <div class="chat-input-wrapper">
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    <div class="chat-input-area">
      <button class="emoji-btn" id="emojiBtn">😊</button>
      <textarea class="chat-input" id="chatInput" placeholder="输入消息..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const emojis = [
      '😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇',
      '🙂','😉','😌','😍','🥰','😘','😋','😛','😜','🤪',
      '😝','🤑','🤗','🤔','🤭','🤫','🤥','😶','😐','😑',
      '😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤐',
      '😷','🤒','🤕','🤢','🤮','🤧','🥵','🥶','🥴','😵',
      '😎','🤓','🧐','😕','😟','🙁','😮','😯','😲','😳',
      '🥺','😦','😧','😰','😥','😢','😭','😱','😖','😣',
      '😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈',
      '👍','👎','👌','✌','🤞','🤟','🤘','🤙','👈','👉',
      '❤️','🧡','💛','💚','💙','💜','🖤','🤍','💔','💕'
    ];

    const emojiPicker = document.getElementById('emojiPicker');
    const emojiBtn = document.getElementById('emojiBtn');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const messageList = document.getElementById('messageList');

    let isAtBottom = true;
    let unreadCount = 0;

    // Build emoji picker
    emojis.forEach(emoji => {
      const btn = document.createElement('button');
      btn.textContent = emoji;
      btn.onclick = () => {
        chatInput.value += emoji;
        chatInput.focus();
        emojiPicker.classList.remove('show');
      };
      emojiPicker.appendChild(btn);
    });

    // Toggle emoji picker
    emojiBtn.onclick = () => {
      emojiPicker.classList.toggle('show');
    };

    document.addEventListener('click', (e) => {
      if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
        emojiPicker.classList.remove('show');
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
      sendBtn.disabled = !chatInput.value.trim();
    });

    // Send message
    function sendMessage(text = null) {
      const content = text || chatInput.value.trim();
      if (!content) return;

      const msg = document.createElement('div');
      msg.className = 'message outgoing';
      msg.innerHTML = `${escapeHtml(content)}<div class="time">${getTime()}</div>`;
      messageList.appendChild(msg);
      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendBtn.disabled = true;
      scrollToBottom();

      // Simulate unread response after 2s
      setTimeout(() => simulateIncoming(), 2000);
    }

    sendBtn.onclick = () => sendMessage();
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Simulate incoming message
    function simulateIncoming() {
      const responses = [
        '好的，收到！',
        '没问题 👍',
        '哈哈哈太好笑了 😄',
        '我在听，请说',
        '稍等一下...',
        '💯 同意！'
      ];
      const content = responses[Math.floor(Math.random() * responses.length)];
      const msg = document.createElement('div');
      msg.className = 'message incoming unread';
      msg.innerHTML = `${escapeHtml(content)}<div class="time">${getTime()}</div>`;
      messageList.appendChild(msg);

      if (isAtBottom) {
        scrollToBottom();
      } else {
        unreadCount++;
      }
    }

    // Track scroll position
    messageList.addEventListener('scroll', () => {
      const { scrollTop, scrollHeight, clientHeight } = messageList;
      isAtBottom = scrollHeight - scrollTop - clientHeight < 50;
      if (isAtBottom) {
        clearUnread();
      }
    });

    function clearUnread() {
      unreadCount = 0;
      document.querySelectorAll('.message.unread').forEach(m => m.classList.remove('unread'));
    }

    function scrollToBottom() {
      messageList.scrollTop = messageList.scrollHeight;
      clearUnread();
    }

    function getTime() {
      return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initial messages
    ['你好，有什么可以帮助你的吗？', '你好！'].forEach((text, i) => {
      const msg = document.createElement('div');
      msg.className = 'message incoming';
      msg.innerHTML = `${escapeHtml(text)}<div class="time">${getTime()}</div>`;
      messageList.appendChild(msg);
    });
    scrollToBottom();
  </script>
</body>
</html>
